<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#08080c"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent glow -->
  <defs>
    <radialGradient id="glow" cx="0.25" cy="0.65" r="0.6">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Hero -->
  <g transform="translate(90, 230)">
    <text font-family="'Syne', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="140" font-weight="800" fill="#ffffff" letter-spacing="-0.03em">
      <tspan x="0" dy="0">MCP servers,</tspan>
      <tspan x="0" dy="1.05em" fill="#f59e0b">sandboxed.</tspan>
    </text>
  </g>

  <!-- Subtitle -->
  <g transform="translate(90, 535)">
    <text font-family="'Instrument Sans', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.7)" letter-spacing="-0.01em">
      <tspan x="0" dy="0">Every tool is a WebAssembly component.</tspan>
      <tspan x="0" dy="1.4em">Deny-by-default filesystem and network.</tspan>
    </text>
  </g>

  <!-- Wordmark -->
  <g transform="translate(1018, 575)">
    <text font-family="'DM Mono', 'JetBrains Mono', 'IBM Plex Mono', 'Consolas', monospace" font-size="40" font-weight="500" fill="#f59e0b" letter-spacing="-0.02em">
      act()
    </text>
  </g>
</svg>
